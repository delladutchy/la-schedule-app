[build]
  command = "npm run build"
  publish = ".next"

# The official Next.js runtime plugin — handles SSR/ISR on Netlify.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Scheduled sync: pulls fresh FreeBusy data from Google every 10 minutes
# and writes a normalized snapshot into Netlify Blobs.
[functions."scheduled-sync"]
  schedule = "*/10 * * * *"

# Scheduled watch renewal: validates existing watch metadata and only
# registers a fresh Google Calendar watch when missing or expiring soon.
[functions."scheduled-google-watch-renew"]
  schedule = "17 4 * * *"

# Security headers on every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
